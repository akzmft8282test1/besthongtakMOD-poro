<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 240px;
        padding: 12px;
        font-family: sans-serif;
        background: #0c0f12;
        color: #fff;
      }
      h3 {
        margin-top: 0;
        color: #ff7a00;
        font-size: 14px;
        text-align: center;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        margin-bottom: 8px;
        background: #161b22;
        color: #fff;
        border: 1px solid #ff7a00;
        border-radius: 4px;
      }
      button {
        width: 100%;
        padding: 8px;
        background: #ff7a00;
        color: #000;
        font-weight: bold;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #e0681a;
      }
    </style>
  </head>
  <body>
    <h3>🔑 쿠폰 인증 및 UID 교환</h3>
    <input type="text" id="pop-coupon" placeholder="발급된 쿠폰 코드 입력" />
    <button id="pop-btn">UID 발급 및 자동 복사</button>
    <script src="popup.js"></script>
  </body>
</html>
